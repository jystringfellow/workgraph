<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WorkGraph</title>
    <style>
      body {
        color: #1d1d1f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        margin: 0;
      }

      main {
        margin: 0 auto;
        max-width: 720px;
        padding: 72px 24px;
      }

      .lockup {
        display: block;
        height: auto;
        margin: 0 0 28px;
        max-width: 168px;
        width: 42vw;
      }

      h1 {
        font-size: 32px;
        font-weight: 650;
        letter-spacing: 0;
        line-height: 1.15;
        margin: 0 0 16px;
      }

      p {
        font-size: 16px;
        margin: 0 0 14px;
      }

      a {
        color: #174ea6;
      }

      code {
        background: #f4f4f5;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.95em;
        padding: 2px 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="lockup" src="/assets/workgraph-lockup.png" alt="WorkGraph">
      <h1>WorkGraph</h1>
      <p>WorkGraph is the open substrate for personal work intelligence.</p>
      <p>This static site hosts OAuth redirect helpers for local WorkGraph clients.</p>
      <p>Canonical web address: <a href="https://workgraph.pages.dev">workgraph.pages.dev</a>.</p>
      <p>The Slack callback endpoint is <code>/slack/callback</code>.</p>
    </main>
  </body>
</html>
